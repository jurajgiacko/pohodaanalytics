<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pohoda Analytics — demo</title>
<meta name="description" content="Demo dashboardu: obrat, marže, plnění plánu, pohledávky a sklad z dat IS POHODA.">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230A1422'/%3E%3Crect x='12' y='34' width='10' height='18' rx='3' fill='%231DC97C'/%3E%3Crect x='27' y='22' width='10' height='30' rx='3' fill='%231DC97C'/%3E%3Crect x='42' y='12' width='10' height='40' rx='3' fill='%23fff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">PA</div>
      <div>
        <div class="brand-name">Pohoda&nbsp;Analytics</div>
        <div class="brand-sub">pracovní název · demo</div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <a href="#prehled" data-view="prehled" class="active"><span class="ico">◧</span>Přehled</a>
      <a href="#prodej" data-view="prodej"><span class="ico">▲</span>Prodej</a>
      <a href="#plan" data-view="plan"><span class="ico">◎</span>Plán &amp; plnění</a>
      <a href="#pohledavky" data-view="pohledavky"><span class="ico">◔</span>Pohledávky &amp; Závazky</a>
      <a href="#sklad" data-view="sklad"><span class="ico">▤</span>Sklad</a>
      <a href="#import" data-view="import"><span class="ico">⇄</span>Napojení na Pohodu</a>
    </nav>
    <div class="sidebar-foot">
      <div class="company-chip" id="companyChip"></div>
      <div class="muted small">Data: demo firma<br>Poslední sync: <span id="lastSync"></span></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 id="viewTitle">Přehled</h1>
      <div class="period-filter" id="periodFilter"></div>
    </header>
    <div id="content"></div>
    <footer class="foot muted small">
      Demo verze — všechna data jsou fiktivní. Pohoda Analytics není produktem společnosti STORMWARE s.r.o.
    </footer>
  </main>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
